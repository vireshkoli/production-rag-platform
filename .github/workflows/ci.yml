name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --dev
      - name: Lint (ruff)
        run: uv run ruff check src evals tests
      - name: Unit tests (LLM calls are mocked; no API key needed)
        run: uv run pytest -q
        env:
          RAG_SKIP_WARMUP: "1"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t production-rag-platform:ci .
